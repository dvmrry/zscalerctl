name: semver-label

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - labeled
      - unlabeled
      - edited

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Verify semver label
        env:
          ZSCALERCTL_PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        run: bash scripts/verify-semver-label.sh
